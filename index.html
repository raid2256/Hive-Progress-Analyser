<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hive Progress Analyzer</title>
  <link rel="stylesheet" href="style.css" />

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-TR3GX4NWZL"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-TR3GX4NWZL');
  </script>
</head>

<body>
  <div class="app">
    <h1>Hive Progress Analyzer</h1>

    <!-- INPUT CARD -->
    <section class="card">
      <h2>Inputs</h2>

      <label>
        Gamemode
        <select id="modeSelect">
          <option value="bedwars">BedWars</option>
          <option value="skywars">SkyWars</option>
          <option value="blockdrop">Block Drop</option>
          <option value="blockparty">Block Party</option>
          <option value="bridge">The Bridge</option>
          <option value="buildbattle">Build Battle</option>
          <option value="ctf">Capture the Flag</option>
          <option value="deathrun">Deathrun</option>
          <option value="gravity">Gravity</option>
          <option value="groundwars">Ground Wars</option>
          <option value="hideandseek">Hide and Seek</option>
          <option value="murdermystery">Murder Mystery</option>
          <option value="survivalgames">Survival Games</option>
        </select>
      </label>

      <label>
        Total XP
        <input type="number" id="xpInput" min="0" value="0" />
      </label>

      <label>
        Games Played
        <input type="number" id="gamesInput" min="0" value="0" />
      </label>

      <label>
        Games Won
        <input type="number" id="winsInput" min="0" value="0" />
      </label>

      <label>
        Target Level (optional)
        <input type="number" id="targetLevelInput" min="1" />
      </label>

      <button id="calcBtn">Calculate</button>
    </section>

    <!-- RESULTS CARD -->
    <section class="card">
      <h2>Results</h2>
      <div id="results">
        <p>Fill in your stats and click Calculate.</p>
      </div>

      <!-- PROGRESS BAR -->
      <div id="progressBarContainer" style="
        margin-top:20px;
        display:none;
        position:relative;
        height:20px;
        background:#1a1c24;
        border-radius:6px;
      ">
        <div id="progressBar" style="
          height:100%;
          width:0%;
          background:#4fd1c5;
          border-radius:6px;
          transition:width 0.4s ease;
        "></div>

        <div id="progressText" style="
          position:absolute;
          top:0;
          left:0;
          width:100%;
          height:100%;
          display:flex;
          align-items:center;
          justify-content:center;
          font-size:14px;
          color:white;
          pointer-events:none;
        "></div>
      </div>
    </section>

    <!-- GRIND CALCULATOR -->
    <section class="card">
      <h2>Grind Calculator</h2>

      <label>
        Average Game Length (minutes)
        <input type="number" id="avgGameLength" min="1" value="4">
      </label>

      <label>
        Games Per Day
        <input type="number" id="gamesPerDay" min="1" value="10">
      </label>

      <button id="grindCalcBtn">Calculate Grind Time</button>

      <div id="grindResults" style="margin-top:15px;"></div>
    </section>

  </div>

  <footer style="text-align:center; opacity:0.6; font-size:12px; margin-top:40px;">
    This site uses Google Analytics to understand usage. No personal data is stored.
  </footer>

  <script src="script.js"></script>
</body>
</html>
